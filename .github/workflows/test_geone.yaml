name: Test Geone Installation (Windows)

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master, develop ]
  workflow_dispatch: # Allows you to run this manually

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        # Geone 1.3.2 supports up to 3.13
        python-version: [ "3.12", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip' # Speeds up subsequent runs

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas matplotlib scipy pyvista

      - name: Install Geone from Source
        # Installing from the current directory (.) ensures 
        # it uses the local Windows binaries in the lib/ folder.
        run: |
          pip install .

      - name: Verify Installation
        # This checks if the compiled C-extensions (DEESSE/GEOSCLASSIC) 
        # can actually be loaded by Python without a DLL error.
        run: |
          python -c "import geone; print('Geone version:', geone.__version__)"
          python -c "from geone import deesse; print('DEESSE module loaded successfully')"
