name: Test Remote Geone Installation (Windows)

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, develop ]
  workflow_dispatch: # Manual trigger for testing

jobs:
  test-geone-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout Geone Repository
        uses: actions/checkout@v4
        with:
          repository: randlab/geone
          ref: master
          path: geone-source # Clones into this subdirectory

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Build Dependencies
        run: |
          python -m pip install --upgrade pip
          # Pre-installing heavy binaries to avoid compilation issues
          pip install numpy pandas matplotlib scipy pyvista

      - name: Force Repair Geone Windows Install
        shell: cmd
        run: |
          @echo off
          :: 1. Find where pip put geone
          python -c "import geone; import os; print(os.path.dirname(geone.__file__))" > path.txt
          set /p GEONE_INSTALL_PATH=<path.txt
          echo Installing into: %GEONE_INSTALL_PATH%

          :: 2. Manually copy the Windows DLLs/Binaries from the source to the install site
          :: Note: geone-source is the path where we checked out the repo earlier
          xcopy /S /Y "geone-source\geone\lib\win\*" "%GEONE_INSTALL_PATH%\"

          :: 3. Check what we have now
          dir /s "%GEONE_INSTALL_PATH%\*.dll"

      - name: Verify Import
        shell: cmd
        run: |
          :: Based on the repo structure, the import is likely:
          python -c "import geone; from geone import deesse_core; print('SUCCESS: deesse_core loaded')"
