name: Test Remote Geone Installation (Windows)

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, develop ]
  workflow_dispatch: # Manual trigger for testing

jobs:
  test-geone-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout Geone Repository
        uses: actions/checkout@v4
        with:
          repository: randlab/geone
          ref: master
          path: geone-source # Clones into this subdirectory

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Discover Library Folders
        shell: cmd
        run: |
          echo --- Available Windows Binary Folders ---
          if exist geone-source\src\geone\lib_deesse_core (
            dir geone-source\src\geone\lib_deesse_core /b
          ) else (
            echo ERROR: lib_deesse_core folder not found!
          )

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas matplotlib scipy pyvista pytest

      - name: Install Geone
        shell: cmd
        run: |
          cd geone-source
          pip install .
          
      - name: Verify Binary Linkage
        shell: cmd
        run: |
          @echo off
          echo --- Testing Imports ---
          :: Based on setup.py, the binaries are mapped to these core modules
          python -c "import geone; from geone.deesse_core import deesse; print('SUCCESS: DEESSE core loaded')" || exit /b 1
          python -c "import geone; from geone.geosclassic_core import geosclassic; print('SUCCESS: GEOSCLASSIC core loaded')" || exit /b 1
          
          echo --- Testing High Level Interface ---
          python -c "import geone.deesseinterface as dsi; print('SUCCESS: Interface Ready')" || exit /b 1
          
      - name: Run Unit Tests (Direct Script)
        shell: cmd
        run: |
          @echo off
          :: 1. Set the PYTHONPATH to include the current directory
          set PYTHONPATH=%PYTHONPATH%;%CD%
          
          echo --- Running Test Estimator ---
          :: Run the file directly but as a module to handle imports
          pytest tests/test_estimator.py -v
