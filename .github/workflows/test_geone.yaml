name: Test Remote Geone Installation (Windows)

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, develop ]
  workflow_dispatch: # Manual trigger for testing

jobs:
  test-geone-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout Geone Repository
        uses: actions/checkout@v4
        with:
          repository: randlab/geone
          ref: master
          path: geone-source # Clones into this subdirectory

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Build Dependencies
        run: |
          python -m pip install --upgrade pip
          # Pre-installing heavy binaries to avoid compilation issues
          pip install numpy pandas matplotlib scipy pyvista

      - name: Force Repair SWIG Modules
        shell: cmd
        run: |
          @echo off
          python -c "import geone; import os; print(os.path.dirname(geone.__file__))" > path.txt
          set /p GEONE_PATH=<path.txt

          :: Copy the .pyd and .dll files into the core folders where the Python wrappers are
          echo Copying binaries to core folders...
          copy /Y "geone-source\geone\lib\win\deesse.*" "%GEONE_PATH%\deesse_core\"
          copy /Y "geone-source\geone\lib\win\geosclassic.*" "%GEONE_PATH%\geosclassic_core\"
          
          :: Also copy them to the main geone folder just in case
          copy /Y "geone-source\geone\lib\win\*.dll" "%GEONE_PATH%\"

      - name: Final Verification
        shell: cmd
        run: |
          echo --- Testing Core ---
          python -c "from geone.deesse_core import deesse; print('SUCCESS: deesse_core found')"
          echo --- Testing Interface ---
          python -c "import geone.deesseinterface as dsi; print('SUCCESS: Interface loaded')"
