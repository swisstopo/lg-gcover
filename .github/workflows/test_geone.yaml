name: Test Remote Geone Installation (Windows)

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, develop ]
  workflow_dispatch: # Manual trigger for testing

jobs:
  test-geone-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout Geone Repository
        uses: actions/checkout@v4
        with:
          repository: randlab/geone
          ref: master
          path: geone-source # Clones into this subdirectory

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Build Dependencies
        run: |
          python -m pip install --upgrade pip
          # Pre-installing heavy binaries to avoid compilation issues
          pip install numpy pandas matplotlib scipy pyvista

      - name: Install Geone from Cloned Source
        # We change directory into the 'geone-source' folder to install
        run: |
          cd geone-source
          pip install .

      - name: Verify Windows DLLs and Package
        shell: cmd
        run: |
          @echo off
          echo --- Finding Geone Install Location ---
          python -c "import geone; import os; print(os.path.dirname(geone.__file__))" > path.txt
          set /p GEONE_PATH=<path.txt
          echo Geone is installed at: %GEONE_PATH%

          echo --- Checking for DLLs in the deesse folder ---
          dir /s "%GEONE_PATH%\*.dll"

          echo --- Attempting Import ---
          python -c "import geone; from geone.deesse import deesse; print('SUCCESS: DEESSE engine loaded!')"
