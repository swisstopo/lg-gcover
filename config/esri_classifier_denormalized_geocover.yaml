# Extended YAML configuration for applying multiple classifications

# Global settings (optional)
global:
    treat_zero_as_null: true
    symbol_field: map_symbol
    label_field: label
    overwrite: False
    identifier_mode: label  # Possible value: 'label' (default), 'index', or 'field'
    languages: "de,fr"
    default_language: "de"

# Layer configurations
layers:
    - gpkg_layer: exploit_points
      gcover_layer: GC_ROCK_BODIES/GC_EXPLOIT_GEOMAT_PT
      connection_ref: postgis_wms
      layer_type: point
      field_types:
        KIND: Int64 # `Int64` with capital `I` is a nullable integer...
        AEXP_STATUS: Int64
        AEXP_TARG_MAT: Int64
        AEXP_DEPTH_TOT: Int64
        GMU_CODE: Int64
      classifications:
        - style_file: styles/Exploit_Geomat_Pt.lyrx
          index: 15
          classification_name: Exploit_Geomat_Pt
          active: True
          mapfile_name: ${GCOVER_LAYERNAME_PREFIX}exploit_geomat_pt
          mapfile_group: ${GCOVER_LAYERNAME_PREFIX}point_features
          data: "${GCOVER_POSTGIS_GEOM} FROM geol.${GCOVER_POSTGIS_TABLE_PREFIX}exploit_points USING UNIQUE gid USING SRID=2056"
          include_items: "kind_desc,aexp_status,aexp_targ_mat_desc,aexp_depth_tot"
          lang_fields:
            kind_desc: "kind_%lang%"
            aexp_status: "aexp_status_%lang%"
            aexp_targ_mat_desc: "aexp_targ_mat_%lang%"
          map_label: False
          mapfile_config:
            symbol_scale: 20000
          # TODO: no filter
          symbol_prefix: geomat_pnt
          fields:
            KIND: KIND
            AEXP_STATUS: AEXP_STATUS

    - gpkg_layer: fossils
      gcover_layer: GC_ROCK_BODIES/GC_FOSSILS
      connection_ref: postgis_wms
      layer_type: point
      field_types:
        KIND: Int64
        LFOS_DIVISION: Int64
        LFOS_STATUS: Int64
      classifications:
        - style_file: styles/Fossils.lyrx
          index: 16
          classification_name: Fossils
          active: True
          mapfile_name: ${GCOVER_LAYERNAME_PREFIX}fossils
          mapfile_group: ${GCOVER_LAYERNAME_PREFIX}point_features
          map_label: False
          data: "${GCOVER_POSTGIS_GEOM} FROM geol.${GCOVER_POSTGIS_TABLE_PREFIX}fossils USING UNIQUE gid USING SRID=2056"
          lang_fields:
            kind_desc: "kind_%lang%"
            lfos_division_desc: "lfos_division_%lang%"
            lfos_status_desc: "lfos_status_%lang%"
          include_items: "kind_desc,lfos_division_desc,lfos_status_desc"
          fields:
            # Map GPKG field to classification field (can be complex paths)
            KIND: KIND
            LFOS_DIVISION: LFOS_DIVISION
            LFOS_STATUS: LFOS_STATUS
          symbol_prefix: fossil

    - gpkg_layer: point_objects
      gcover_layer: GC_ROCK_BODIES/GC_POINT_OBJECTS
      connection_ref: postgis_wms
      layer_type: point
      computed_fields:  # must match case of source
        map_angle: "(90 - AZIMUTH) % 360"
      field_types:
        KIND: Int64
        HSUR_STATUS: Int64
        HSUR_TYPE: Int64
        RUNC_PROTECTED: Int64
        RUNC_ROCK_TYP: Int64
        RUNC_PROTECTED: Int64
        MPLA_POLARITY: Int64
        DIP: Int64
        ABOR_FM_A: Int64
        MPLA_POLARITY: Int64
        TDEF_FOLD_TYP: Int64
        AEXP_STATUS: Int64
        ABOR_DEPTH_BEDR: Int64
        AZIMUTH: Int64

      classifications:
        - style_file: styles/Point_Mpla_Planar_Structures.lyrx
          index: 20
          classification_name: Point_Mpla_Planar_Structures
          active: True
          mapfile_name: ${GCOVER_LAYERNAME_PREFIX}planar_struct
          mapfile_group: ${GCOVER_LAYERNAME_PREFIX}point_features
          maxscaledenom: 50000
          mapfile_config:
            tolerance: 10
            symbol_adjustments:
              point_size_multiplier: 1.5
            metadata:
              wms_group_title: Point Objects
            rotation_field: map_angle
          filter: KIND IN (13801001,13801002, 13801004, 13801003, 13801005, 13801006)
          # Convert angles.. but keep the name TODO
          data: "${GCOVER_POSTGIS_GEOM} FROM  (SELECT ${GCOVER_POSTGIS_GEOM}, gid, map_symbol, map_angle FROM geol.${GCOVER_POSTGIS_TABLE_PREFIX}point_objects WHERE azimuth >=0 AND azimuth <=360) AS subquery  USING UNIQUE gid USING SRID=2056"
          include_items: "kind_desc,dip,map_angle,mpla_polarity_desc,mpla_phase_desc,mpla_ob_dip_slo,mpla_phase_ref"
          lang_fields:
            kind_desc: "kind_%lang%"
            mpla_polarity_desc: "mpla_polarity_%lang%"
            mpla_phase_desc: "mpla_phase_%lang%"
          fields:
            # Map GPKG field to classification field (can be complex paths)
            KIND: KIND
            MPLA_POLARITY: MPLA_POLARITY
            DIP: DIP
          symbol_prefix: planar_struct
        - style_file: styles/Point Objects_Achsenfläche.lyrx
          index: 21
          classification_name: Point Objects_Achsenfläche
          mapfile_name: ${GCOVER_LAYERNAME_PREFIX}achsenflaeche
          active: True
          mapfile_group: ${GCOVER_LAYERNAME_PREFIX}point_features
          include_items: "kind_desc,map_angle,dip"
          # Only a few 100s features
          data: "${GCOVER_POSTGIS_GEOM} FROM  (SELECT ${GCOVER_POSTGIS_GEOM}, gid, label, map_symbol, dip, map_angle FROM geol.${GCOVER_POSTGIS_TABLE_PREFIX}point_objects WHERE azimuth >=0 AND azimuth <=360 AND map_symbol ILIKE '%achsen%') AS subquery  USING UNIQUE gid USING SRID=2056"
          lang_fields:
            kind_desc: "kind_%lang%"
          map_label: False
          mapfile_config:
            rotation_field: map_angle
            symbol_adjustments:
              point_size_multiplier: 1.5
            metadata:
              wms_group_title: Point Objects
          maxscaledenom: 50000
          filter: KIND=14601006
          fields:
            # Map GPKG field to classification field (can be complex paths)
            KIND: KIND
            TDEF_FOLD_TYP: TDEF_FOLD_TYP
          symbol_prefix: achsenflaeche
        - style_file: styles/Point Objects_Orient.lyrx
          index: 22
          classification_name: Point Objects_Orient
          mapfile_name: pnt_orient
          mapfile_group: point_features
          maxscaledenom: 50000
          map_label: True  # Use the .lyrx defined, if exists
          mapfile_config:
            rotation_field: map_angle
            tolerance: 10
            symbol_adjustments:
              point_size_multiplier: 1.5
            metadata:
              wms_group_title: Point Objects
          active: True
          data: "${GCOVER_POSTGIS_GEOM} FROM  (SELECT ${GCOVER_POSTGIS_GEOM}, gid, label, ltyp_name, map_symbol, map_angle FROM geol.${GCOVER_POSTGIS_TABLE_PREFIX}point_objects WHERE azimuth >=0 AND azimuth <=360) AS subquery  USING UNIQUE gid USING SRID=2056"
          include_items: "kind_desc"
          lang_fields:
            kind_desc: "kind_%lang%"
          filter: KIND IN (11901001,12501002,12501003,12501004,12501006,12101006,13601001,13601002 ,13601003,13701001,13701002,13701004,14601004)
          fields:
            # Map GPKG field to classification field (can be complex paths)
            KIND: KIND
          symbol_prefix: orient
        - style_file: styles/Point_Objects.lyrx
          index: 22
          classification_name: Point_Objects
          mapfile_name: pnt_objects
          mapfile_group: point_features
          maxscaledenom: 50000
          map_label: True  # Use the .lyrx defined, if exists
          mapfile_config:
            rotation_field: map_angle
            tolerance: 10
            symbol_adjustments:
              point_size_multiplier: 1.5
            metadata:
              wms_group_title: Point Objects
          active: True
          data: "${GCOVER_POSTGIS_GEOM} FROM  (SELECT ${GCOVER_POSTGIS_GEOM}, gid, label, map_symbol, map_angle FROM geol.${GCOVER_POSTGIS_TABLE_PREFIX}point_objects ) AS subquery  USING UNIQUE gid USING SRID=2056"
          include_items: "kind_desc"
          lang_fields:
            kind_desc: "kind_%lang%"
          filter: KIND NOT IN (10501001,10501002,10501003,10501004,10501005,11901001,12501001,12101006,12501002,12501003,12501004,12501006,13601001,13601002,13601003,13701001,13701002,13701004,13801001,13801002,13801003,13801004,13801005,13801006,14401001,14401002,14601004,14601006)
          fields:
            # Map GPKG field to classification field (can be complex paths)
            KIND: KIND
          symbol_prefix: pnt_objects
        - style_file: styles/Point_Objects_Bohrung_Fels_erreicht.lyrx
          index: 26
          classification_name: Point_Objects_Bohrung_Fels_erreicht
          mapfile_name: ${GCOVER_LAYERNAME_PREFIX}bohrung_fels_erreicht
          mapfile_group: ${GCOVER_LAYERNAME_PREFIX}point_features
          maxscaledenom: 50000
          include_items: "label,kind,abor_depth_bedr,abor_fm_a,abor_fm_b,abor_depth_tot,abor_depth_fm_a,abor_depth_fm_b"
          active: True
          map_label: abor_depth_tot
          mapfile_config:
            symbol_scale: 12500
            tolerance: 10
            symbol_adjustments:
              point_size_multiplier: 1.5
            metadata:
              wms_group_title: Point Objects
          # data: "${GCOVER_POSTGIS_GEOM} FROM geol.${GCOVER_POSTGIS_TABLE_PREFIX}point_objects  USING UNIQUE gid USING SRID=2056"
          data: "${GCOVER_POSTGIS_GEOM} FROM  (SELECT ${GCOVER_POSTGIS_GEOM}, gid, label, abor_depth_tot, map_symbol FROM geol.${GCOVER_POSTGIS_TABLE_PREFIX}point_objects) AS subquery  USING UNIQUE gid USING SRID=2056"
          include_items: "kind_desc,abor_depth_bedr,abor_fm_a_desc,abor_fm_b_desc,abor_main_tar_desc,abor_targ_mat_desc,abor_depth_bedr,abor_depth_tot"
          lang_fields:
            kind_desc: "kind_%lang%"
            abor_fm_a_desc: "abor_fm_a_%lang%"
            abor_fm_b_desc: "abor_fm_b_%lang%"
            abor_main_tar_desc: "abor_main_tar_%lang%"
            abor_targ_mat_desc: "abor_targ_mat_%lang%"
          filter: KIND=10501001 AND ABOR_DEPTH_BEDR<>999
          fields:
            # Map GPKG field to classification field (can be complex paths)
            KIND: KIND
            ABOR_FM_A: ABOR_FM_A
          symbol_prefix: bohrung_fels_erreicht

        - style_file: styles/Point_Objects_Sondierung.lyrx
          index: 27
          classification_name: Point_Objects_Sondierung
          mapfile_name: ${GCOVER_LAYERNAME_PREFIX}sondierung
          mapfile_group: ${GCOVER_LAYERNAME_PREFIX}point_features
          maxscaledenom: 50000
          include_items: "kind_desc,abor_depth_bedr,abor_fm_a_desc,abor_fm_b_desc,abor_main_tar_desc,abor_targ_mat_desc,abor_depth_bedr,abor_depth_tot"
          lang_fields:
            kind_desc: "kind_%lang%"
            abor_fm_a_desc: "abor_fm_a_%lang%"
            abor_fm_b_desc: "abor_fm_b_%lang%"
            abor_main_tar_desc: "abor_main_tar_%lang%"
            abor_targ_mat_desc: "abor_targ_mat_%lang%"
          active: True
          map_label: False
          mapfile_config:
            metadata:
              wms_group_title: Point Objects
          data: "${GCOVER_POSTGIS_GEOM} FROM geol.${GCOVER_POSTGIS_TABLE_PREFIX}point_objects  USING UNIQUE gid USING SRID=2056"
          include_items: "kind,label"
          filter: KIND IN (1051002,10501003,10501004,10501005)
          symbol_prefix: sondierung
          fields:
            KIND: KIND
            ABOR_DEPTH_BEDR: ABOR_DEPTH_BEDR

        - style_file: styles/Point_Objects_Bohrung_Fels_nicht_erreicht.lyrx
          index: 28
          classification_name: Point_Objects_Bohrung_Fels_nicht_erreicht
          mapfile_name: ${GCOVER_LAYERNAME_PREFIX}bohrung_fels_nicht_erreicht
          mapfile_group: ${GCOVER_LAYERNAME_PREFIX}point_features
          maxscaledenom: 50000
          include_items: "kind_desc,abor_depth_bedr,abor_fm_a_desc,abor_fm_b_desc,abor_main_tar_desc,abor_targ_mat_desc,abor_depth_bedr,abor_depth_tot"
          active: True
          map_label: False
          mapfile_config:
            metadata:
              wms_group_title: Point Objects
          data: "${GCOVER_POSTGIS_GEOM} FROM geol.${GCOVER_POSTGIS_TABLE_PREFIX}point_objects  USING UNIQUE gid USING SRID=2056"
          lang_fields:
            kind_desc: "kind_%lang%"
            abor_fm_a_desc: "abor_fm_a_%lang%"
            abor_fm_b_desc: "abor_fm_b_%lang%"
            abor_main_tar_desc: "abor_main_tar_%lang%"
            abor_targ_mat_desc: "abor_targ_mat_%lang%"

          filter: KIND=10501001 AND ABOR_DEPTH_BEDR = 999
          fields:
            # Map GPKG field to classification field (can be complex paths)
            KIND: KIND
            ABOR_DEPTH_BEDR: ABOR_DEPTH_BEDR
          symbol_prefix: bohrung_fels_nicht_erreicht
        - style_file: styles/Point Objects_Quelle.lyrx
          index: 29
          classification_name: Point Objects_Quelle
          mapfile_name: ${GCOVER_LAYERNAME_PREFIX}quelle
          mapfile_group: ${GCOVER_LAYERNAME_PREFIX}point_features
          maxscaledenom: 50000
          active: True
          map_label: False
          mapfile_config:
            symbol_adjustments:
              point_size_multiplier: 1.5
            metadata:
              wms_group_title: Point Objects
          data: "${GCOVER_POSTGIS_GEOM} FROM geol.${GCOVER_POSTGIS_TABLE_PREFIX}point_objects  USING UNIQUE gid USING SRID=2056"
          include_items: "kind_desc,hsur_status_desc,hsur_flow_con_desc,hsur_type_desc,hsur_combi_desc,hsur_temp,hsur_chemistry"
          lang_fields:
            kind_desc: "kind_%lang%"
            hsur_status_desc: "hsur_status_%lang%"
            hsur_type_desc: "hsur_type_%lang%"
            hsur_flow_con_desc: "hsur_flow_con_%lang%"
            hsur_combi_desc: "hsur_combi_%lang%"
          filter: KIND=12501001
          fields:
            # Map GPKG field to classification field (can be complex paths)
            KIND: KIND
            HSUR_TYPE: HSUR_TYPE
            HSUR_STATUS: HSUR_STATUS
          symbol_prefix: point_quelle
        - style_file: styles/Point Objects_Erraticker.lyrx
          index: 30
          classification_name: Point Objects_Erraticker
          active: True
          mapfile_name: ${GCOVER_LAYERNAME_PREFIX}erratiker
          mapfile_group: ${GCOVER_LAYERNAME_PREFIX}point_features
          maxscaledenom: 50000
          map_label: False
          mapfile_config:
            symbol_adjustments:
              point_size_multiplier: 1.5
            metadata:
              wms_group_title: Point Objects
          data: "${GCOVER_POSTGIS_GEOM} FROM geol.${GCOVER_POSTGIS_TABLE_PREFIX}point_objects  USING UNIQUE gid USING SRID=2056"
          lang_fields:
            kind_desc: "kind_%lang%"
            runc_rock_typ_desc: "runc_rock_typ_%lang%"
            runc_rock_spe_desc: "runc_rock_spe_%lang%"
            runc_protected_desc: "runc_protected_%lang%"
            runc_status_desc: "runc_status_%lang%"

          # TODO: missing AND (PRINTED = 1 OR PRINTED IS NULL)
          include_items: "kind_desc,runc_rock_typ_desc,runc_rock_spe_desc,runc_protected_desc,runc_status_desc"
          filter: KIND IN (14401001,14401002)
          fields:
            # Map GPKG field to classification field (can be complex paths)
            KIND: KIND
            RUNC_ROCK_TYP: RUNC_ROCK_TYP
            RUNC_PROTECTED: RUNC_PROTECTED
          symbol_prefix: point_erratiker


    - gpkg_layer: linear_objects
      gcover_layer: GC_ROCK_BODIES/GC_LINEAR_OBJECTS
      connection_ref: postgis_wms
      layer_type: line
      computed_fields:
        length_m: "geometry.length"
        bearing_deg: "geometry.bearing:int" # 0-360° from north
        # Strike for geological features (0-180)
        strike_deg: "geometry.strike:int"  # 0-180° (no direction)
        # MapServer angle convention (0=East, CCW positive)
        map_angle: "(90 - geometry.bearing) % 360:int"
      field_types:
        KIND: Int64
        TTEC_STATUS: Int64
        TTEC_LIM_TYP: Int64
        LPRO_LITHO: Int64
        GGLA_GLAC_TYP: Int64
        LGEO_STATUS: Int64
        TTEC_META_STA: Int64
      classifications:
        - style_file: styles/Linear Objects_Moränenwall.lyrx
          index: 50
          classification_name: Linear Objects_Moränenwall
          active: True
          filter: KIND=11301001
          mapfile_name: ${GCOVER_LAYERNAME_PREFIX}linear_moraenenwall
          mapfile_group: ${GCOVER_LAYERNAME_PREFIX}linear_features
          include_items: "kind_desc,ggla_glac_typ_desc,ggla_morai_mo_desc"
          mapfile_config:
            classes_mode: frozen
            symbol_scale: 12500
            tolerance: 10
            metadata:
              wms_group_title: Linear Objects
          map_label: False
          data: "${GCOVER_POSTGIS_GEOM} FROM  (SELECT ${GCOVER_POSTGIS_GEOM}, gid, map_angle, strike_deg, map_symbol FROM geol.${GCOVER_POSTGIS_TABLE_PREFIX}linear_objects) AS subquery  USING UNIQUE gid USING SRID=2056"
          lang_fields:
            kind_desc: "kind_%lang%"
            ggla_glac_typ_desc: "ggla_glac_typ_%lang%"
            ggla_morai_mo_desc: "ggla_morai_mo_%lang%"
          fields:
            KIND: KIND
            GGLA_GLAC_TYP: GGLA_GLAC_TYP
          maxscaledenom: 50000
          symbol_prefix: moraenenwall


        - style_file: styles/Linear Objects.lyrx
          index: 51
          classification_name: Linear Objects
          active: True
          mapfile_name: ${GCOVER_LAYERNAME_PREFIX}linear_objects
          mapfile_group: ${GCOVER_LAYERNAME_PREFIX}linear_features
          mapfile_config:
            classes_mode: frozen
            tolerance: 10
            metadata:
              wms_group_title: Linear Objects
          map_label: False  # Don't use mapfile LABEL, even if defined in .lyrx
          data: "${GCOVER_POSTGIS_GEOM} FROM  (SELECT ${GCOVER_POSTGIS_GEOM}, gid, map_angle, strike_deg, map_symbol FROM geol.${GCOVER_POSTGIS_TABLE_PREFIX}linear_objects) AS subquery  USING UNIQUE gid USING SRID=2056"

          lang_fields:
            kind_desc: "kind_%lang%"
            aarc_epoch_desc: "aarc_epoch_%lang%"
            aarc_period_desc: "aarc_period_%lang%"
            lpro_litho_desc: "lpro_litho_%lang%"
            aexp_status_desc: "aexp_status_%lang%"
          include_items: "kind_desc,aexp_status_desc,aarc_epoch_desc,aarc_period_desc,lpro_litho_desc"
          # El cheapo filter
          filter: KIND IN (10201002,10201007,10201006,10201001,10201005,10201004,10201003,10701001,10701002,10901002,10901001,11101001,11101003,11101002,11301007,11301003,11301002,11301006,11301005,11301008,11301009,11301004,11701003,11701002,11701001,11701004,12201001,12201002,12301001,12301004,12301006,12301002,12301007,12301005,12301003,12401001,12601002,12601001,13001001,13301001,13901001,14001001,14701001)
          fields:
              KIND: KIND
          maxscaledenom: 50000
          symbol_prefix: linear_objects

        - style_file: styles/Linear Objects_GeolKontur.lyrx
          index: 52
          classification_name: Linear Objects_GeolKontur
          mapfile_name: ${GCOVER_LAYERNAME_PREFIX}geolkontur
          mapfile_group: ${GCOVER_LAYERNAME_PREFIX}linear_features
          include_items: "kind_spec"
          mapfile_config:
            tolerance: 10
            metadata:
              wms_group_title: Linear Objects
          map_label: False
          data: "${GCOVER_POSTGIS_GEOM} FROM  (select * from geol.${GCOVER_POSTGIS_TABLE_PREFIX}linear_objects where map_symbol in ('geolkontur_1' , 'geolkontur_0')) as a  USING UNIQUE gid USING SRID=2056"
          filter: KIND = 13001001
          fields:
              KIND: KIND
              LGEO_STATUS: LGEO_STATUS
          maxscaledenom: 50000
          symbol_prefix: geolkontur

        - style_file: styles/Linear Objects_Gesteinhorizont.lyrx
          classification_name: Linear Objects_Gesteinhorizont
          active: True
          mapfile_name: ${GCOVER_LAYERNAME_PREFIX}gesteinhorizont
          mapfile_group: ${GCOVER_LAYERNAME_PREFIX}linear_features
          mapfile_config:
            classes_mode: frozen
            symbol_scale: 12500
            tolerance: 10
            metadata:
              wms_group_title: Linear Objects
          map_label: False
          data: "${GCOVER_POSTGIS_GEOM} FROM geol.${GCOVER_POSTGIS_TABLE_PREFIX}linear_objects  USING UNIQUE gid USING SRID=2056"
          include_items: "kind_desc,lpro_cong_spe_desc,lpro_litho_desc"
          lang_fields:
              kind_desc: "kind_%lang%"
              lpro_cong_spe_desc: "lpro_cong_spe_%lang%"
              lpro_litho_desc: "lpro_litho_%lang%"
          fields:
              KIND: KIND
              LPRO_LITHO: LPRO_LITHO
          symbol_prefix: gesteinhorizont
          filter: KIND = 13101001
        - style_file: styles/Linear Objects_Hilfs_Karto.lyrx
          index: 54
          classification_name: Linear Objects_Hilfs_Karto
          active: False
          mapfile_name: ${GCOVER_LAYERNAME_PREFIX}hilfs_karto
          mapfile_group: ${GCOVER_LAYERNAME_PREFIX}linear_features
          mapfile_config:
            tolerance: 10
          map_label: False
          data: "${GCOVER_POSTGIS_GEOM} FROM geol.${GCOVER_POSTGIS_TABLE_PREFIX}linear_objects  USING UNIQUE gid USING SRID=2056"
          fields:
              KIND: KIND
          maxscaledenom: 50000
          symbol_prefix: hilfs_karto
          filter: KIND IN (15601001, 15601002)

        - style_file: styles/Linear Objects_Bruch.lyrx
          index: 55
          classification_name: Linear Objects_Bruch
          active: True
          mapfile_name: ${GCOVER_LAYERNAME_PREFIX}linear_bruch
          mapfile_group: ${GCOVER_LAYERNAME_PREFIX}tecto_lines
          include_items: "kind_desc,ttec_name,ttec_lim_typ_desc,ttec_status_desc,ttec_lim_tect_b_desc"
          mapfile_config:
            classes_mode: frozen
            tolerance: 10
            metadata:
              wms_group_title: Linear Objects
          map_label: False
          data: "${GCOVER_POSTGIS_GEOM} FROM geol.${GCOVER_POSTGIS_TABLE_PREFIX}linear_objects  USING UNIQUE gid USING SRID=2056"
          lang_fields:
              kind_desc: "kind_%lang%"
              ttec_status_desc: "ttec_status_%lang%"
              ttec_lim_typ_desc: "ttec_lim_typ_%lang%"
              ttec_lim_tect_b_desc: "ttec_lim_tect_b_%lang%"
          fields:
            # Map GPKG field to classification field (can be complex paths)
            KIND: KIND
            TTEC_STATUS: TTEC_STATUS
          symbol_prefix: linear_bruch
          filter: KIND IN (14901002,14901004,14901005,14901006,14901007,14901008) # definitionExpression
        - style_file: styles/Linear Objects_Ueberschiebung.lyrx
          index: 56
          classification_name: Linear Objects_Ueberschiebung
          active: True
          mapfile_name: ${GCOVER_LAYERNAME_PREFIX}linear_ueberschiebung
          mapfile_group: ${GCOVER_LAYERNAME_PREFIX}tecto_lines
          include_items: "kind_desc,ttec_status_desc,ttec_lim_typ_desc,ttec_lim_tect_b_desc"
          mapfile_config:
            classes_mode: frozen
            symbol_scale: 12500
            tolerance: 10
            metadata:
              wms_group_title: Linear Objects
          map_label: False
          data: "${GCOVER_POSTGIS_GEOM} FROM geol.${GCOVER_POSTGIS_TABLE_PREFIX}linear_objects  USING UNIQUE gid USING SRID=2056"
          lang_fields:
              kind_desc: "kind_%lang%"
              ttec_status_desc: "ttec_status_%lang%"
              ttec_lim_typ_desc: "ttec_lim_typ_%lang%"
              ttec_lim_tect_b_desc: "ttec_lim_tect_b_%lang%"
          filter: KIND = 14901001
          fields:
            # Map GPKG field to classification field (can be complex paths)
