    - gpkg_layer: bedrock
      gcover_layer: GC_ROCK_BODIES/GC_BEDROCK
      connection_ref: postgis_wms
      layer_type: polygon
      template: templates/bedrock.html
      computed_fields:
        area_m2: "geometry.area"
        litho_combined_code: "concat(litho_main_code, litho_sec_code, litho_ter_code):str"
        chrono_combined_code: "concat(chrono_base_code,chrono_top_code):str"
      field_types:
        KIND: Int64
        RBED_EXOTIC_ELE: Int64
        CORRELATION: Int64
        GMU_CODE: Int64
        chrono_top_code: Int64
        chrono_base_code: Int64
        litho_main_code: Int64
        litho_sec_code: Int64
        litho_ter_code: Int64
      classifications:
        - style_file: styles/Bedrock.lyrx
          index: 100
          classification_name: Bedrock
          active: True
          mapfile_name: ${GCOVER_LAYERNAME_PREFIX}bedrock
          # mapfile_group: ${GCOVER_LAYERNAME_PREFIX}bedrock
          map_label: False
          data: "${GCOVER_POSTGIS_GEOM} FROM geol.${GCOVER_POSTGIS_TABLE_PREFIX}bedrock USING UNIQUE gid USING SRID=2056"
          # Constant alias names → language-specific columns
          lang_fields:
              gmu_code_desc: "gmu_%lang%"
              tecto_desc: "tecto_%lang%"
              litho_desc: "litho_combined_%lang%"
              chrono_desc: "chrono_combined_%lang%"
              correlation_desc: "correlation_%lang%"
              litstrat_formation_bank: "litstrat_formation_bank_%lang%"
          # These names stay stable for all clients regardless of LANGUAGE= param
          include_items: "gmu_desc,tecto_desc,litho_desc,chrono_desc,correlation_desc,strati_link,erl_link,ber_link"
          fields:
            # Map GPKG field to classification field (can be complex paths)
            GMU_CODE: TOPGIS_GC.GC_GEOL_MAPPING_UNIT_ATT.GEOL_MAPPING_UNIT
          symbol_prefix: bedrock
          filter: KIND == 14334001
          identifier_field: TOPGIS_GC.GC_GEOL_MAPPING_UNIT_ATT.GEOL_MAPPING_UNIT
          identifier_mode: field


